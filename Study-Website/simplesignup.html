<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Sign Up</title>
  <style>
    body{
       
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #36486b;
        font-family: Arial, sans-serif;
    }
    :root{
      --bg:#f5f7fb; --card:#fff; --text:#222; --muted:#666;
      --primary:#4f46e5; --border:#e5e7eb;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      background:var(--bg); color:var(--text); padding:24px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .card{
      width:100%; max-width:420px; background:var(--card); border:1px solid var(--border);
      border-radius:12px; padding:22px 20px 24px; box-shadow:0 8px 20px rgba(0,0,0,.06);
    }
    h1{ margin:0 0 10px; font-size:1.4rem; }
    .sub{ margin:0 0 16px; color:var(--muted); font-size:.95rem; }
    form{ display:grid; gap:12px; }
    label{ font-size:.9rem; }
    input{
      width:100%; padding:12px; border:1px solid var(--border); border-radius:10px;
      background:#fff; color:inherit; font:inherit; outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 3px rgba(79,70,229,.15);
    }
    button{
      padding:12px 14px; border:0; border-radius:10px; background:var(--primary);
      color:#fff; font-weight:600; cursor:pointer;
    }
    button:hover{ filter:brightness(1.05); }
  </style>
</head>
<body style="background-color: #302f4c;">
  <main class="card" role="region" aria-labelledby="title">
    <h1 id="title">Sign up</h1>
    <p class="sub">Create your account</p>

    <form action="#" method="post" novalidate>
      <div>
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="jdoe" required />
      </div>

      <div>
        <label for="fullName">Full name</label>
        <input id="fullName" name="fullName" type="text" placeholder="Jane Doe" required />
      </div>

      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
      </div>

      <div>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="At least 8 characters" minlength="8" required />
      </div>

      <!-- <button type="submit">Sign up</button> -->
       <a href="index.html" class="btn btn-primary">Sign up</a>
    </form>
  </main>
</body>
</html>
